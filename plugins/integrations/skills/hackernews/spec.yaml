name: hackernews
description: "Hacker News from your terminal — with a local store, full-text search, and agent-native output no other HN tool has"
cli_description: "Read, search, and analyze Hacker News with a local SQLite store, offline full-text search, and agent-native output"
version: "1.0.0"
base_url: "https://hacker-news.firebaseio.com/v0"
website_url: "https://news.ycombinator.com"
category: "media-and-entertainment"

auth:
  type: none

config:
  format: toml
  path: "~/.config/hackernews-pp-cli/config.toml"

cache:
  enabled: true

mcp:
  transport:
    - stdio
    - http
  addr: ":7777"

resources:
  stories:
    description: "Browse top, new, and best Hacker News stories"
    endpoints:
      top:
        method: GET
        path: "/topstories.json"
        description: "Get the current top stories on Hacker News"
        params:
          - name: limit
            type: int
            description: "Maximum number of story IDs to return (max 500)"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      new:
        method: GET
        path: "/newstories.json"
        description: "Get the newest stories on Hacker News"
        params:
          - name: limit
            type: int
            description: "Maximum number of story IDs to return (max 500)"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      best:
        method: GET
        path: "/beststories.json"
        description: "Get the highest-voted stories on Hacker News"
        params:
          - name: limit
            type: int
            description: "Maximum number of story IDs to return (max 200)"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      ask:
        method: GET
        path: "/askstories.json"
        description: "Get the latest Ask HN posts"
        params:
          - name: limit
            type: int
            description: "Maximum number of story IDs to return (max 200)"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      show:
        method: GET
        path: "/showstories.json"
        description: "Get the latest Show HN posts"
        params:
          - name: limit
            type: int
            description: "Maximum number of story IDs to return (max 200)"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      job:
        method: GET
        path: "/jobstories.json"
        description: "Get the latest Hacker News job postings"
        params:
          - name: limit
            type: int
            description: "Maximum number of story IDs to return (max 200)"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

  items:
    description: "Fetch any HN item (story, comment, job, poll) by ID"
    endpoints:
      get:
        method: GET
        path: "/item/{itemId}.json"
        description: "Get details for a specific story, comment, job, or poll"
        params:
          - name: itemId
            type: string
            required: true
            positional: true
            description: "Hacker News item ID (e.g., 12345678)"
        response:
          type: object
          item: Item
        no_auth: true

  users:
    description: "Look up Hacker News user profiles"
    endpoints:
      get:
        method: GET
        path: "/user/{userId}.json"
        description: "Get a user's profile including karma and submission history"
        params:
          - name: userId
            type: string
            required: true
            positional: true
            description: "Hacker News username (case-sensitive, e.g., 'pg' or 'dang')"
        response:
          type: object
          item: User
        no_auth: true

  updates:
    description: "Recently changed items and profiles"
    endpoints:
      list:
        method: GET
        path: "/updates.json"
        description: "Items and user profiles that have changed recently"
        response:
          type: object
          item: Updates
        no_auth: true

  maxitem:
    description: "Current maximum item ID"
    endpoints:
      get:
        method: GET
        path: "/maxitem.json"
        description: "Returns the largest item ID currently assigned by Hacker News"
        response:
          type: object
          item: MaxItem
        no_auth: true

extra_commands:
  - name: sync
    description: "Pull top/new/best/show/ask/job lists and recent items into the local SQLite store"
  - name: search
    description: "Full-text search Hacker News stories and comments via Algolia (use 'search local' for offline FTS)"
    args: "<query>"
  - name: hiring
    description: "Mine 'Ask HN: Who is hiring' threads (filter, stats, companies)"
  - name: freelance
    description: "Mine 'Ask HN: Freelancer? Seeking freelancer?' threads (filter)"
  - name: since
    description: "Show what changed on the front page since the last sync (added, removed, moved stories)"
  - name: pulse
    description: "Show what HN is saying about a topic — per-day mentions, score, and comment volume"
    args: "<topic>"
  - name: controversial
    description: "Find stories with the highest comment-to-point ratio (polarizing discussions)"
  - name: repost
    description: "Has this URL been posted on HN? Lists prior submissions with scores and dates"
    args: "<url>"
  - name: velocity
    description: "Show a story's rank trajectory across local snapshots"
    args: "<id>"
  - name: doctor
    description: "Run a self-diagnostic: API reachability, store writability, config sanity"

types:
  StoryID:
    fields:
      - name: id
        type: int

  Item:
    fields:
      - name: id
        type: int
      - name: type
        type: string
      - name: by
        type: string
      - name: time
        type: int
      - name: title
        type: string
      - name: url
        type: string
      - name: score
        type: int
      - name: descendants
        type: int
      - name: text
        type: string
      - name: parent
        type: int
      - name: dead
        type: bool
      - name: deleted
        type: bool
      - name: kids
        type: "[]int"

  User:
    fields:
      - name: id
        type: string
      - name: karma
        type: int
      - name: about
        type: string
      - name: created
        type: int
      - name: submitted
        type: "[]int"

  Updates:
    fields:
      - name: items
        type: "[]int"
      - name: profiles
        type: "[]string"

  MaxItem:
    fields:
      - name: id
        type: int
