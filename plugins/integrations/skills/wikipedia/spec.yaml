openapi: "3.0.3"
info:
  x-display-name: Wikipedia
  title: Wikipedia
  version: "1.0.0"
  description: |
    Wikipedia REST API. Get article summaries, search, browse related topics,
    and access on-this-day events. No authentication required.
    Uses a polite User-Agent header.
servers:
  - url: https://en.wikipedia.org/api/rest_v1
    description: Wikipedia REST v1 (English)
tags:
  - name: pages
    description: Article content and metadata
  - name: search
    description: Search articles

paths:
  /page/summary/{title}:
    get:
      operationId: get-summary
      summary: Get article summary
      description: Returns a page summary including title, extract text, thumbnail, and coordinates.
      tags: [pages]
      parameters:
        - name: title
          in: path
          required: true
          schema:
            type: string
          description: Article title (underscores for spaces, e.g. "Python_(programming_language)")
        - name: redirect
          in: query
          schema:
            type: boolean
            default: true
          description: Follow redirects
      responses:
        "200":
          description: Page summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Summary"

  /page/html/{title}:
    get:
      operationId: get-html
      summary: Get article HTML
      description: Returns the full article body as styled HTML.
      tags: [pages]
      parameters:
        - name: title
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article HTML

  /page/media-list/{title}:
    get:
      operationId: get-media
      summary: Get article media
      description: Returns images, videos, and other media files associated with an article.
      tags: [pages]
      parameters:
        - name: title
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Media list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaList"

  # /page/related/{title} removed: Wikimedia deprecated this endpoint
  # (returns HTTP 403 globally as of 2026). Replacement, when available,
  # would slot in here with the same shape. See PR #170 sweep verification.

  /page/random/summary:
    get:
      operationId: get-random
      summary: Get a random article summary
      description: Returns a random Wikipedia article summary.
      tags: [pages]
      parameters: []
      responses:
        "200":
          description: Random article summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Summary"

  /feed/onthisday/{type}/{month}/{day}:
    get:
      operationId: get-on-this-day
      summary: Events on this day
      description: Returns events, births, deaths, or holidays that occurred on a given date.
      tags: [pages]
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [all, selected, births, deaths, events, holidays]
        - name: month
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: day
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 31
      responses:
        "200":
          description: On-this-day events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnThisDay"

components:
  schemas:
    Summary:
      type: object
      properties:
        type:
          type: string
          enum: [standard, disambiguation, no-extract]
        title:
          type: string
        displaytitle:
          type: string
        extract:
          type: string
          description: Plain text article extract (first paragraph)
        extract_html:
          type: string
          description: HTML formatted extract
        thumbnail:
          $ref: "#/components/schemas/Thumbnail"
        description:
          type: string
          description: Short one-line description
        coordinates:
          $ref: "#/components/schemas/Coordinates"
        lang:
          type: string
        dir:
          type: string
        content_urls:
          type: object
          properties:
            desktop:
              $ref: "#/components/schemas/ContentUrl"
            mobile:
              $ref: "#/components/schemas/ContentUrl"
        timestamp:
          type: string
          format: date-time

    Thumbnail:
      type: object
      properties:
        source:
          type: string
          format: uri
        width:
          type: integer
        height:
          type: integer

    Coordinates:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number

    ContentUrl:
      type: object
      properties:
        page:
          type: string
          format: uri
        revisions:
          type: string
          format: uri
        edit:
          type: string
          format: uri

    MediaList:
      type: object
      properties:
        title:
          type: string
        media_count:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              section_id:
                type: integer
              type:
                type: string
              caption:
                type: object
                properties:
                  html:
                    type: string
                  text:
                    type: string
              original:
                $ref: "#/components/schemas/Original"
              thumbnail:
                $ref: "#/components/schemas/Thumbnail"

    Original:
      type: object
      properties:
        source:
          type: string
          format: uri
        width:
          type: integer
        height:
          type: integer
        mime:
          type: string

    RelatedPages:
      type: object
      properties:
        pages:
          type: array
          items:
            $ref: "#/components/schemas/Summary"

    OnThisDay:
      type: object
      properties:
        selected:
          type: array
          items:
            $ref: "#/components/schemas/OnThisDayEvent"
        births:
          type: array
          items:
            $ref: "#/components/schemas/OnThisDayEvent"
        deaths:
          type: array
          items:
            $ref: "#/components/schemas/OnThisDayEvent"
        events:
          type: array
          items:
            $ref: "#/components/schemas/OnThisDayEvent"
        holidays:
          type: array
          items:
            $ref: "#/components/schemas/OnThisDayEvent"

    OnThisDayEvent:
      type: object
      properties:
        text:
          type: string
        year:
          type: integer
          description: Year the event occurred (negative for BCE)
        pages:
          type: array
          items:
            $ref: "#/components/schemas/Summary"
