name: archive-is
display_name: archive.today
description: "Archive.is CLI - paywall bypass and web archive lookup via the archive.today / archive.ph service"
version: "1.0.0"
base_url: "https://archive.ph"

auth:
  type: none
  env_vars: []

config:
  format: toml
  path: ~/.config/archive-is-pp-cli/config.toml

resources:
  snapshots:
    description: "Fetch and list archived snapshots of web pages"
    endpoints:
      timegate:
        method: GET
        path: /timegate/{url}
        description: "Find the best snapshot for a URL. Returns 302 with Location header pointing at the memento. Memento Protocol compliant."
        params:
          - name: url
            type: string
            required: true
            positional: true
            description: "The original URL to look up. URL-encode special characters."
        body: []
        response:
          type: object
          item: memento
        pagination: null

      timemap:
        method: GET
        path: /timemap/{url}
        description: "Get all known snapshots for a URL as a Memento link-format list. Returns text/application/link-format."
        params:
          - name: url
            type: string
            required: true
            positional: true
            description: "The original URL to list snapshots for"
        body: []
        response:
          type: array
          item: memento
        pagination: null

      newest:
        method: GET
        path: /newest/{url}
        description: "Get the most recent snapshot for a URL. Redirects to the latest memento."
        params:
          - name: url
            type: string
            required: true
            positional: true
            description: "The original URL"
        body: []
        response:
          type: object
          item: memento
        pagination: null

  captures:
    description: "Submit URLs to create new archive snapshots"
    endpoints:
      submit:
        method: GET
        path: /submit/
        description: "Submit a URL for archiving. Synchronous, can take 30-120 seconds. Returns the memento URL in Refresh/Location header."
        params:
          - name: url
            type: string
            required: true
            positional: false
            description: "URL to archive"
          - name: anyway
            type: string
            required: false
            positional: false
            description: "Set to 1 to force a fresh capture even if a recent snapshot exists"
        body: []
        response:
          type: object
          item: memento
        pagination: null

  feeds:
    description: "Global activity feeds and search"
    endpoints:
      recent:
        method: GET
        path: /rss
        description: "Global RSS feed of recently archived URLs across all users"
        params: []
        body: []
        response:
          type: array
          item: feed_item
        pagination: null

      search:
        method: GET
        path: /search/
        description: "Search archived pages by query. Returns HTML; must be parsed."
        params:
          - name: q
            type: string
            required: true
            positional: true
            description: "Search query"
        body: []
        response:
          type: array
          item: search_result
        pagination: null

types:
  memento:
    description: "An archived snapshot of a URL"
    fields:
      - name: original_url
        type: string
        description: "The URL that was archived"
      - name: memento_url
        type: string
        description: "The archive.ph URL for this snapshot"
      - name: captured_at
        type: string
        description: "ISO 8601 timestamp of when the snapshot was captured"
      - name: mirror
        type: string
        description: "Which mirror served this snapshot (archive.ph, archive.md, etc.)"

  feed_item:
    description: "An entry from the global RSS feed"
    fields:
      - name: url
        type: string
      - name: captured_at
        type: string
      - name: title
        type: string

  search_result:
    description: "A result from the HTML search page"
    fields:
      - name: url
        type: string
      - name: memento_url
        type: string
      - name: captured_at
        type: string
